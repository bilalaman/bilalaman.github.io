<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Bilal Aman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0eeea;color:#1a1a1a;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:480px}
h1{font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:700;color:#9a7d2e;line-height:1;letter-spacing:-4px}
p{font-size:16px;color:#555550;margin-top:12px;line-height:1.6}
a{display:inline-block;margin-top:24px;padding:10px 24px;background:#9a7d2e;color:#fff;text-decoration:none;border-radius:100px;font-size:14px;font-weight:500;transition:all .3s}
a:hover{background:#7c6a2e;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="wrap">
<h1>404</h1>
<p>This page doesn't exist — but the dashboard does.</p>
<a href="/">Go to Dashboard</a>
</div>
</body>
</html>
